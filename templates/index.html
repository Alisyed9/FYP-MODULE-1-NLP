<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLP Threat Classifier - Multi-class Classification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeInDown 0.6s ease;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .module {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            animation: fadeInUp 0.6s ease;
        }

        .module h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .module-icon {
            width: 30px;
            height: 30px;
            background: #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.95em;
        }

        textarea, input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95em;
            transition: border-color 0.3s ease;
        }

        textarea:focus, input[type="text"]:focus, input[type="file"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 150px;
            font-family: 'Consolas', 'Monaco', monospace;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-clear {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-clear:hover {
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
            animation: fadeInUp 0.6s ease;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 15px;
        }

        .results-header h2 {
            color: #667eea;
            font-size: 1.5em;
        }

        .close-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 8px 16px;
            font-size: 0.85em;
            width: auto;
        }

        .result-item {
            background: #f8f9fa;
            border-left: 5px solid #667eea;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .result-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .result-text {
            margin-bottom: 12px;
            color: #555;
            font-size: 0.95em;
            line-height: 1.5;
        }

        .result-label {
            color: #999;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8em;
            margin-bottom: 3px;
        }

        .threat-classification {
            display: flex;
            gap: 15px;
            margin: 15px 0;
        }

        .threat-badge {
            background: white;
            padding: 15px;
            border-radius: 8px;
            flex: 1;
            text-align: center;
            border: 2px solid #667eea;
        }

        .threat-name {
            font-weight: 700;
            color: #667eea;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .threat-confidence {
            font-size: 1.3em;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .confidence-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.6s ease;
        }

        .all-predictions {
            margin-top: 15px;
            background: white;
            padding: 12px;
            border-radius: 8px;
        }

        .prediction-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.9em;
        }

        .prediction-item:last-child {
            border-bottom: none;
        }

        .prediction-label {
            color: #555;
            font-weight: 600;
        }

        .prediction-score {
            color: #667eea;
            font-weight: 700;
            font-family: 'Courier New', monospace;
        }

        .entities {
            background: white;
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
        }

        .entity-tag {
            display: inline-block;
            background: #e8eaf6;
            color: #667eea;
            padding: 5px 10px;
            border-radius: 20px;
            margin: 3px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .file-input-wrapper {
            position: relative;
            cursor: pointer;
        }

        .file-input-label {
            display: block;
            padding: 15px;
            background: #f5f5f5;
            border: 2px dashed #667eea;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .file-input-wrapper:hover .file-input-label {
            background: #f0f0f0;
            border-color: #764ba2;
        }

        .file-input-wrapper input {
            display: none;
        }

        .download-results {
            margin-top: 20px;
            text-align: right;
        }

        .btn-download {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            width: auto;
        }

        .btn-download:hover {
            box-shadow: 0 5px 20px rgba(17, 153, 142, 0.4);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .threat-classification {
                flex-direction: column;
            }

            .button-group {
                flex-direction: column;
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.85em;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 NLP Threat Classifier</h1>
            <p>Multi-class Text Classification using Bidirectional LSTM</p>
        </div>

        <div class="content">
            <!-- Module 1: Direct Text Input -->
            <div class="module">
                <h2>
                    <div class="module-icon">📝</div>
                    Module 1: Direct Text Classification
                </h2>
                <form id="textForm">
                    <div class="form-group">
                        <label for="textInput">Enter Text to Classify</label>
                        <textarea id="textInput" placeholder="Paste your tweet or threat text here..." required></textarea>
                    </div>
                    <div class="button-group">
                        <button type="submit">🚀 Classify Text</button>
                        <button type="button" class="btn-clear" onclick="clearTextForm()">🔄 Clear</button>
                    </div>
                    <div class="loading" id="textLoading">
                        <div class="spinner"></div>
                        <p>Analyzing text with Bidirectional LSTM...</p>
                    </div>
                    <div class="error" id="textError"></div>
                </form>
            </div>

            <!-- Module 2: File Upload -->
            <div class="module">
                <h2>
                    <div class="module-icon">📂</div>
                    Module 2: Batch File Processing
                </h2>
                <form id="fileForm">
                    <div class="form-group">
                        <label>Upload File (.xlsx, .csv, or .txt)</label>
                        <div class="file-input-wrapper">
                            <label class="file-input-label" for="fileInput">
                                📁 Click to upload or drag & drop
                            </label>
                            <input type="file" id="fileInput" name="file" accept=".xlsx,.csv,.txt" required>
                        </div>
                    </div>
                    <div class="button-group">
                        <button type="submit">📤 Upload & Process</button>
                        <button type="button" class="btn-clear" onclick="clearFileForm()">🔄 Clear</button>
                    </div>
                    <div class="loading" id="fileLoading">
                        <div class="spinner"></div>
                        <p>Processing batch file...</p>
                    </div>
                    <div class="error" id="fileError"></div>
                    <div class="success" id="fileSuccess"></div>
                </form>
            </div>
        </div>

        <!-- Results Section -->
        <div class="results" id="resultsSection">
            <div class="results-header">
                <h2>📊 Classification Results</h2>
                <button type="button" class="close-btn" onclick="closeResults()">✕ Close</button>
            </div>

            <div class="stats" id="statsBox" style="display: none;">
                <div class="stat-box">
                    <div class="stat-value" id="totalProcessed">0</div>
                    <div class="stat-label">Processed</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="avgConfidence">0%</div>
                    <div class="stat-label">Avg Confidence</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="domainThreat">-</div>
                    <div class="stat-label">Primary Threat</div>
                </div>
            </div>

            <div id="resultsList"></div>
            <div class="download-results" id="downloadBox" style="display: none;">
                <button type="button" class="btn-download" onclick="downloadResults()">⬇️ Download Results as CSV</button>
            </div>
        </div>
    </div>

    <script>
        let currentResults = [];

        // Text Form Submission
        document.getElementById('textForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = document.getElementById('textInput').value.trim();

            if (!text) {
                showError('textError', 'Please enter some text to classify');
                return;
            }

            showLoading('textLoading', true);
            hideError('textError');

            try {
                const response = await fetch('/api/classify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                const data = await response.json();

                if (data.success) {
                    currentResults = [{ ...data, source: 'Direct Input' }];
                    displayResults();
                } else {
                    showError('textError', data.error || 'Classification failed');
                }
            } catch (error) {
                showError('textError', `Error: ${error.message}`);
            } finally {
                showLoading('textLoading', false);
            }
        });

        // File Form Submission
        document.getElementById('fileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = document.getElementById('fileInput').files[0];

            if (!file) {
                showError('fileError', 'Please select a file');
                return;
            }

            showLoading('fileLoading', true);
            hideError('fileError');

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    currentResults = data.results.map((r, idx) => ({ ...r, source: 'File Upload', index: idx }));
                    displayResults();
                    showSuccess('fileSuccess', `Successfully processed ${data.total_processed} items!`);
                } else {
                    showError('fileError', data.error || 'Upload failed');
                }
            } catch (error) {
                showError('fileError', `Error: ${error.message}`);
            } finally {
                showLoading('fileLoading', false);
            }
        });

        // Drag and Drop
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.querySelector('.file-input-label');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            fileLabel.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            fileLabel.addEventListener(eventName, () => {
                fileLabel.style.background = '#f0f0f0';
                fileLabel.style.borderColor = '#764ba2';
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            fileLabel.addEventListener(eventName, () => {
                fileLabel.style.background = '#f5f5f5';
                fileLabel.style.borderColor = '#667eea';
            }, false);
        });

        fileLabel.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            fileInput.files = files;
        }, false);

        // Display Results
        function displayResults() {
            const resultsSection = document.getElementById('resultsSection');
            const resultsList = document.getElementById('resultsList');
            resultsList.innerHTML = '';

            if (currentResults.length === 0) return;

            // Calculate stats
            const totalProcessed = currentResults.length;
            const avgConfidence = (currentResults.reduce((sum, r) => sum + (r.confidence || 0), 0) / totalProcessed * 100).toFixed(1);
            const threatCounts = {};
            currentResults.forEach(r => {
                threatCounts[r.threat_type] = (threatCounts[r.threat_type] || 0) + 1;
            });
            const domainThreat = Object.keys(threatCounts).reduce((a, b) => threatCounts[a] > threatCounts[b] ? a : b, '');

            document.getElementById('totalProcessed').textContent = totalProcessed;
            document.getElementById('avgConfidence').textContent = avgConfidence + '%';
            document.getElementById('domainThreat').textContent = domainThreat || 'N/A';
            document.getElementById('statsBox').style.display = 'grid';
            document.getElementById('downloadBox').style.display = 'block';

            // Display each result
            currentResults.forEach((result, idx) => {
                const resultHtml = `
                    <div class="result-item">
                        <div class="result-label">Result #${idx + 1}</div>
                        <div class="result-text"><strong>Text:</strong> ${escapeHtml(result.original_text || result.generalized_text).substring(0, 150)}...</div>
                        
                        <div class="threat-classification">
                            <div class="threat-badge">
                                <div class="threat-name">🎯 Prediction</div>
                                <div class="threat-name" style="color: #764ba2; font-size: 1.3em;">${result.threat_type}</div>
                            </div>
                            <div class="threat-badge">
                                <div class="threat-name">📈 Confidence</div>
                                <div class="threat-confidence">${(result.confidence * 100).toFixed(2)}%</div>
                                <div class="confidence-bar">
                                    <div class="confidence-fill" style="width: ${result.confidence * 100}%"></div>
                                </div>
                            </div>
                        </div>

                        ${result.entities && result.entities.length > 0 ? `
                            <div class="entities">
                                <strong>🏷️ Named Entities:</strong>
                                ${result.entities.map(e => `<span class="entity-tag">${escapeHtml(e[0])} (${e[1]})</span>`).join('')}
                            </div>
                        ` : ''}

                        <div class="all-predictions">
                            <strong>📊 All Threat Probabilities:</strong>
                            ${Object.entries(result.all_predictions).map(([label, score]) => `
                                <div class="prediction-item">
                                    <span class="prediction-label">${label}</span>
                                    <span class="prediction-score">${(score * 100).toFixed(2)}%</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                resultsList.innerHTML += resultHtml;
            });

            resultsSection.style.display = 'block';
            resultsSection.scrollIntoView({ behavior: 'smooth' });
        }

        // Utility Functions
        function showLoading(elementId, show) {
            document.getElementById(elementId).style.display = show ? 'block' : 'none';
        }

        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.style.display = 'block';
        }

        function hideError(elementId) {
            document.getElementById(elementId).style.display = 'none';
        }

        function showSuccess(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.style.display = 'block';
        }

        function clearTextForm() {
            document.getElementById('textForm').reset();
            hideError('textError');
        }

        function clearFileForm() {
            document.getElementById('fileForm').reset();
            hideError('fileError');
            hideError('fileSuccess');
        }

        function closeResults() {
            document.getElementById('resultsSection').style.display = 'none';
            currentResults = [];
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function downloadResults() {
            if (currentResults.length === 0) return;

            const headers = ['Index', 'Original Text', 'Threat Type', 'Confidence', 'Generalized Text'];
            const rows = currentResults.map((r, idx) => [
                idx + 1,
                r.original_text || r.generalized_text,
                r.threat_type,
                (r.confidence * 100).toFixed(2) + '%',
                r.generalized_text
            ]);

            const csv = [headers, ...rows]
                .map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
                .join('\n');

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `nlp_threat_classification_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
